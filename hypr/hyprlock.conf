# General Settings
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0 # No grace period (locks immediately)
    no_fade_in = false
}

# Background: Blurs your current screen
background {
    monitor = 
    path = screenshot # Captures current screen automatically
    blur_passes = 3   # Higher = more blur (0 disables it)
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Label: Digital Clock
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 80
    font_family = Sans
    position = 0, -50
    halign = center
    valign = center
}

# Label: Date
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(255, 255, 255, 0.8)
    font_size = 20
    font_family = Sans
    position = 0, 100
    halign = center
    valign = center
}

# Input Field: Password Box
input-field {
    monitor = 
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(200, 200, 200, 0.5)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, 200
    halign = center
    valign = center
    rounding = 10
}   
